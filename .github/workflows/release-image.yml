# Build the Unfireable Safety Kernel image and publish to GHCR, then
# mirror the published multi-arch manifest to Docker Hub.
#
# Triggers:
#   - push to main             -> publishes :edge
#   - tag v*.*.*               -> publishes :<semver> and :latest
#   - manual workflow_dispatch -> publishes :<tag-input> (default: dev)
#
# Multi-arch: linux/amd64 + linux/arm64 via docker buildx.
#
# Registries:
#   - GHCR (canonical): ghcr.io/<repo>. Auth via GITHUB_TOKEN —
#     always available, no setup required.
#   - Docker Hub (mirror): docker.io/aryaailabs/unfireable-safety-kernel.
#     Auth via DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets. The
#     mirror job SOFT-SKIPS when those secrets are absent, so the GHCR
#     publish is never blocked on Docker Hub credentials. The mirror
#     copies the already-built GHCR manifest by digest (no rebuild).
#
# All actions pinned to commit SHAs per repo security policy. The
# original tag is retained as a trailing comment.

name: release-image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile.prod'
      - '.dockerignore'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/release-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (default: dev)'
        required: false
        default: 'dev'

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish mid-flight

jobs:
  build-and-push:
    name: Build + push multi-arch image
    runs-on: ubuntu-latest
    outputs:
      # The multi-arch index digest of the published image. The
      # dockerhub-mirror job copies exactly this digest so the mirror is
      # bit-identical to GHCR. Empty on pull_request (push=false).
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Only authenticate to GHCR on push/dispatch — pull_request runs
      # build the image to validate the Dockerfile but never publish.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Branch pushes: tag as :edge (only for main)
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            # PR validate-only build: tag as :pr-<num> (never published)
            type=ref,event=pr
            # Tag pushes: tag as :<semver> + :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # workflow_dispatch: tag with the input
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Unfireable Safety Kernel
            org.opencontainers.image.description=Fail-closed, machine-checked authorization service for AI agents.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=ARYA Labs PBC

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile.prod
          # On pull_request: amd64 only (faster CI feedback). On push/tag: amd64 + arm64.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          # Validate-only on PRs; publish on push/dispatch.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build cache lives in GHA cache to keep cold builds fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image published with digest: ${{ steps.build.outputs.digest }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"

  # ============================================================
  # Docker Hub mirror — copies the GHCR multi-arch manifest by digest.
  # Soft-skips when DOCKERHUB_* secrets are absent so the GHCR publish
  # is never gated on Docker Hub credentials. Never runs on PRs (the
  # PR build does not publish, so there is nothing to mirror).
  # ============================================================
  dockerhub-mirror:
    name: Mirror to Docker Hub
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Mapped to env so the presence check does not interpolate the
      # secret directly into a shell command.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_IMAGE: docker.io/aryaailabs/unfireable-safety-kernel
      # The published index digest. The GHCR ref is assembled in-script
      # with a lowercased ${GITHUB_REPOSITORY} — OCI/Docker repository
      # names must be lowercase, and github.repository preserves the
      # org's case (ARYA-Labs-PBC), which imagetools rejects.
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.digest }}
    steps:
      - name: Check Docker Hub credentials present
        id: check
        run: |
          if [ -n "${DOCKERHUB_TOKEN}" ] && [ -n "${DOCKERHUB_USERNAME}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docker Hub mirror skipped::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set; GHCR remains the only published registry for this run."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.available == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # imagetools must READ the source manifest from GHCR. The GHCR
      # package is not anonymously pullable, so authenticate with the
      # job's GITHUB_TOKEN (the workflow grants packages: write, which
      # includes read) before the copy. Without this the copy fails with
      # "failed to fetch anonymous token: 401 Unauthorized".
      - name: Log in to GHCR (read source manifest)
        if: steps.check.outputs.available == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.check.outputs.available == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Recompute the SAME tag set, but for the Docker Hub image name.
      # Same trigger logic -> same tags as the GHCR publish.
      - name: Compute Docker Hub tags
        id: meta-dh
        if: steps.check.outputs.available == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Mirror GHCR manifest to Docker Hub
        if: steps.check.outputs.available == 'true'
        env:
          DH_TAGS: ${{ steps.meta-dh.outputs.tags }}
        run: |
          set -euo pipefail
          # Build a --tag flag per computed Docker Hub tag, then copy the
          # multi-arch index from GHCR (by digest) to all of them in one
          # imagetools call. No rebuild; this is a manifest copy.
          tag_flags=()
          while IFS= read -r t; do
            [ -n "$t" ] && tag_flags+=(--tag "$t")
          done <<< "${DH_TAGS}"
          if [ "${#tag_flags[@]}" -eq 0 ]; then
            echo "::notice::No Docker Hub tags computed for this ref; nothing to mirror."
            exit 0
          fi
          # OCI repository names must be lowercase; ${GITHUB_REPOSITORY}
          # carries the org's case (ARYA-Labs-PBC), so lowercase it here.
          GHCR_DIGEST_REF="ghcr.io/${GITHUB_REPOSITORY,,}@${IMAGE_DIGEST}"
          echo "Mirroring ${GHCR_DIGEST_REF} -> ${DOCKERHUB_IMAGE} with tags:"
          printf '  %s\n' "${DH_TAGS}"
          docker buildx imagetools create "${tag_flags[@]}" "${GHCR_DIGEST_REF}"

      - name: Confirm Docker Hub manifest
        if: steps.check.outputs.available == 'true'
        run: |
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}:edge" || true
