# CI for the safety-kernel public repo.
#
# Runs on every push to main and every pull request. Three jobs:
#   - rust:     fmt + clippy + check + test against the workspace
#   - python:   ruff + py-defense pytest
#   - openapi:  OpenAPI spec validity check
#
# All actions are pinned to commit SHAs per repo security policy
# (see SECURITY.md). The original tag is retained as a trailing
# comment for human readability.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on new pushes to the same branch/PR — saves CI
# minutes when a developer force-pushes a fixup.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Rust workspace: format, lint, build, test
  # ============================================================
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain (stable, matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo clippy --workspace (warnings non-blocking)
        run: cargo clippy --workspace --all-targets -- -W warnings

      - name: cargo test --workspace
        # We allow this to print test output but failures still gate the build.
        run: cargo test --workspace --no-fail-fast

      - name: cargo publish --dry-run (qorch-domain, leaf crate)
        run: cargo publish --dry-run -p qorch-domain --allow-dirty

  # ============================================================
  # Python: py-defense — lint + test the audit-hook library
  # ============================================================
  python:
    name: Python (py-defense)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install py-defense + test extras
        working-directory: py-defense
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install ruff (style + lint)
        run: python -m pip install ruff

      - name: ruff check
        working-directory: py-defense
        run: ruff check safety_kernel_defense

      - name: ruff format --check
        working-directory: py-defense
        run: ruff format --check safety_kernel_defense

      - name: pytest
        working-directory: py-defense
        run: pytest safety_kernel_defense/tests/ -v

      - name: build wheel + sdist
        working-directory: py-defense
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  # ============================================================
  # OpenAPI: spec validity + schema-against-implementation drift smoke
  # ============================================================
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install yq (for YAML parsing)
        run: |
          sudo wget -q -O /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate spec is well-formed YAML
        run: yq e 'tag' contracts/openapi/safety_kernel.yaml >/dev/null

      - name: Spec has openapi version + info.title
        run: |
          version=$(yq e '.openapi' contracts/openapi/safety_kernel.yaml)
          title=$(yq e '.info.title' contracts/openapi/safety_kernel.yaml)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::contracts/openapi/safety_kernel.yaml is missing top-level 'openapi:' version"
            exit 1
          fi
          if [ -z "$title" ] || [ "$title" = "null" ]; then
            echo "::error::contracts/openapi/safety_kernel.yaml is missing info.title"
            exit 1
          fi
          echo "OpenAPI ${version}, title: ${title}"

      - name: Install + run redocly lint (gating)
        # Spec must pass redocly's recommended ruleset clean.
        run: |
          npm install -g @redocly/cli@1.34.5
          redocly lint contracts/openapi/safety_kernel.yaml
