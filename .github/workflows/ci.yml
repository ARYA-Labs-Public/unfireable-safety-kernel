# CI for the safety-kernel public repo.
#
# Runs on every push to main and every pull request. Three jobs:
#   - rust:     fmt + clippy + check + test against the workspace
#   - python:   ruff + py-defense pytest
#   - openapi:  OpenAPI spec validity check
#
# All actions are pinned to commit SHAs per repo security policy
# (see SECURITY.md). The original tag is retained as a trailing
# comment for human readability.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs on new pushes to the same branch/PR — saves CI
# minutes when a developer force-pushes a fixup.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Rust workspace: format, lint, build, test
  # ============================================================
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain (stable, matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo clippy --workspace (warnings non-blocking)
        run: cargo clippy --workspace --all-targets -- -W warnings

      - name: cargo test --workspace
        # We allow this to print test output but failures still gate the build.
        run: cargo test --workspace --no-fail-fast

      - name: cargo publish --dry-run (qorch-domain, leaf crate)
        run: cargo publish --dry-run -p qorch-domain --allow-dirty

  # ============================================================
  # Kani: formal verification of the fail-closed gate decision
  # ============================================================
  kani:
    name: Kani (fail-closed proof)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Kani on the gate_decision proof harnesses
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          working-directory: '.'
          args: >-
            -p qorch-domain
            --harness safety::client_state::kani_proofs::open_within_cooldown_always_refuses
            --harness safety::client_state::kani_proofs::open_permits_only_after_cooldown
            --harness safety::client_state::kani_proofs::half_open_with_probe_in_flight_refuses
            --harness safety::client_state::kani_proofs::permit_characterization_is_exhaustive

  # ============================================================
  # Python: py-defense — lint + test the audit-hook library
  # ============================================================
  python:
    name: Python (py-defense)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install py-defense + test extras
        working-directory: py-defense
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install ruff (style + lint)
        run: python -m pip install ruff

      - name: ruff check
        working-directory: py-defense
        run: ruff check safety_kernel_defense

      - name: ruff format --check
        working-directory: py-defense
        run: ruff format --check safety_kernel_defense

      - name: pytest
        working-directory: py-defense
        run: pytest safety_kernel_defense/tests/ -v

      - name: build wheel + sdist
        working-directory: py-defense
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  # ============================================================
  # AF taxonomy: ARY-1887 release-gate adversarial coverage script.
  # Enforces "every AF class has >=1 Rust fixture + >=1 Python fixture
  # (or an explicit deferral stub)" per docs/release-gate/af-taxonomy.md.
  # Bash + find only — no toolchain dependencies, no third-party
  # actions beyond actions/checkout.
  # ============================================================
  af-coverage:
    name: AF taxonomy coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run scripts/audit_adversarial_coverage.sh
        run: bash scripts/audit_adversarial_coverage.sh

      - name: Negative-gate tests (coverage script rejects bypass attacks)
        # ARY-2361 AC4: assert the coverage script REJECTS a no-op fixture
        # substitution (F2) and a forbidden deferral marker (F3). This is
        # the Rule 8 adversarial fixture for the gate itself.
        run: bash tests/adversarial/test_coverage_gate.sh

      - name: Run Python AF seed fixtures (pure stdlib)
        # `python_files` discovery is configured in pytest.ini (ARY-2362),
        # so no -o override is needed here.
        run: |
          python -m pip install --quiet pytest
          python -m pytest tests/adversarial/python/ -v

  # ============================================================
  # OpenAPI: spec validity + schema-against-implementation drift smoke
  # ============================================================
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq (for YAML parsing)
        run: |
          sudo wget -q -O /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate spec is well-formed YAML
        run: yq e 'tag' contracts/openapi/safety_kernel.yaml >/dev/null

      - name: Spec has openapi version + info.title
        run: |
          version=$(yq e '.openapi' contracts/openapi/safety_kernel.yaml)
          title=$(yq e '.info.title' contracts/openapi/safety_kernel.yaml)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::contracts/openapi/safety_kernel.yaml is missing top-level 'openapi:' version"
            exit 1
          fi
          if [ -z "$title" ] || [ "$title" = "null" ]; then
            echo "::error::contracts/openapi/safety_kernel.yaml is missing info.title"
            exit 1
          fi
          echo "OpenAPI ${version}, title: ${title}"

      - name: Install + run redocly lint (gating)
        # Spec must pass redocly's recommended ruleset clean.
        run: |
          npm install -g @redocly/cli@1.34.5
          redocly lint contracts/openapi/safety_kernel.yaml

  # ============================================================
  # Python bindings: build the safety_kernel_client PyO3 wheel
  # (crates/adapters/safety_kernel_py) and smoke-test the import +
  # fingerprint parity + fail-closed verifier.
  # ============================================================
  python-bindings:
    name: Python bindings (safety_kernel_client wheel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain (stable, matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build wheel (maturin) + smoke test
        working-directory: crates/adapters/safety_kernel_py
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --out dist
          python -m pip install dist/*.whl
          python - <<'PY'
          import hashlib, json, safety_kernel_client as skc
          p = {"b": 2, "a": "x", "n": {"z": [3, 1], "y": True}}
          exp = hashlib.sha256(json.dumps(p, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode()).hexdigest()
          assert skc.params_fingerprint(p) == exp, "fingerprint parity FAILED"
          v = skc.PinnedKeyVerifier(bytes(range(32)))
          assert len(v.fingerprint) == 16
          try:
              v.verify("not.a.token", 1_000_000.0); raise SystemExit("verify did not fail closed")
          except ValueError:
              pass
          print("safety_kernel_client wheel OK: fingerprint parity + fail-closed verifier")
          PY
