# nginx policy snippet for the Safety Kernel (, seam #1 of 4).
#
# Drops in at the location level of any upstream you want to gate. Calls
# a sidecar /auth-check endpoint backed by packages.safety.client.sdk
# (see../reference_app/app.py for a working /auth-check stub).
#
# ENFORCEMENT MODEL
# -----------------
# nginx is the OUTERMOST seam — it runs BEFORE the application sees the
# request. Bypassing the FastAPI middleware (seam #2) by skipping the
# proxy is impossible because nginx terminates the connection.
#
# auth_request returns one of:
#   200/204 → allow, forward to upstream
#   401     → "no api key" — caller must reauthenticate
#   403     → "kernel denied" — terminate
#   503     → "kernel unreachable" — fail-closed; the request body is
#             replaced with a JSON error
#
# CONFIGURATION
# -------------
# 1. Define the auth-check sidecar upstream (assumes a sidecar running
#    on port 8500 — see../reference_app/app.py for an example):
#
#    upstream safety_auth_check {
#        server localhost:8500;
#    }
#
# 2. Inside any location block you want to gate, add the include:
#
#    location /api/v1/rsi/ {
#        include conf.d/safety_kernel_auth_request.conf;  # this file
#        proxy_pass http://upstream-app;
#    }
#
# 3. Optionally tune cache + timeouts:
#
#    auth_request_set $kernel_action $upstream_http_x_kernel_action;
#    auth_request_set $kernel_run_id $upstream_http_x_kernel_run_id;

# ---------------------------------------------------------------------------
# The actual auth_request directive — paste this inside a location block
# (or use `include` to reference this file).
# ---------------------------------------------------------------------------

auth_request /auth-check;
auth_request_set $kernel_decision $upstream_http_x_kernel_decision;
auth_request_set $kernel_action   $upstream_http_x_kernel_action;
auth_request_set $kernel_run_id   $upstream_http_x_kernel_run_id;

# Forward the kernel decision metadata to the upstream so application
# logic can attach the signed token to downstream calls.
proxy_set_header X-Kernel-Decision $kernel_decision;
proxy_set_header X-Kernel-Action   $kernel_action;
proxy_set_header X-Kernel-Run-Id   $kernel_run_id;

# Custom error pages — fail-closed.
error_page 401 = @kernel_unauthorized;
error_page 403 = @kernel_denied;
error_page 503 = @kernel_unavailable;

# ---------------------------------------------------------------------------
# The /auth-check internal location — placed at the server level (NOT
# inside the gated location block). Reference example:
# ---------------------------------------------------------------------------
#
