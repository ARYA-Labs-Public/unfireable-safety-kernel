# cargo-deny policy for the safety-kernel Rust workspace.
# [advisories] — block on any vulnerability advisory in the
# RustSec database.
# 2. [licenses] — allowlist of permissive licenses we vetted.
# 3. [bans] — explicit denials of native-tls / openssl-sys
# so the workspace cannot regress to a non-rustls
# TLS stack (Addendum 2a §2 "Anti-pin").
# 4. [sources] — only allow crates.io and our own GitHub org.
# Run locally:
# cargo install cargo-deny
# cargo deny check
# CI integration (separate task) lifts this to a required check on PRs.

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
 # rustls-pemfile 2.2.0 is unmaintained (archived; its functionality moved
 # into rustls-pki-types ≥1.9). It is a thin transitive wrapper pulled via
 # reqwest → hyper-rustls; NOT a vulnerability. Tracked for removal when
 # the upstream stack drops the dep. Re-review by 2026-09-01.
 "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# Allowlist of permissive licenses that are compatible with our
# proprietary distribution (per legal review 2026-05).
allow = [
 "MIT",
 "Apache-2.0",
 "Apache-2.0 WITH LLVM-exception",
 "BSD-2-Clause",
 "BSD-3-Clause",
 "ISC",
 "Unicode-DFS-2016",
 "Unicode-3.0",
 "Zlib",
 "CC0-1.0",
 "MPL-2.0",
 "BSL-1.0",
 # webpki-roots v1.0+ relicensed Mozilla's bundled root-CA *data* under
 # CDLA-Permissive-2.0 (a permissive, business-friendly data license).
 # Required for the rustls trust anchors; vetted permissive.
 "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Addendum 2a §2 "Anti-pin": NO native-tls; use rustls + rustls::crypto::ring.
# These crates are banned outright because they pull in OpenSSL via
# system libraries, which we explicitly do not want in any binary the
# Safety Kernel client links into.
deny = [
 { name = "native-tls" },
 { name = "openssl" },
 { name = "openssl-sys" },
 { name = "openssl-probe" },
 # : Addendum 2a -lc-rs;
 # use rustls + rustls::crypto::ring instead.
 { name = "aws-lc-rs" },
 { name = "aws-lc-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow first-party GitHub sources (ARYA-Labs-PBC org) so we can
# vendor patched forks if needed without tripping the source ban.
allow-org = { github = ["ARYA-Labs-PBC"] }
