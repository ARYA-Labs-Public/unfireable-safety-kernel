# deployment/docker-compose.prod.yml
#
# Reference production-shape compose stack for the Unfireable Safety
# Kernel. Three services: the kernel, the transparency log (with its own
# persistent volume), and a sample app slot. Every service runs read-only,
# non-root, with all Linux capabilities dropped — the same hardening
# applied in docs/deployment/docker.md.
#
# Quickstart:
#   # 1. Generate boot secrets — base64url-encoded 32-byte values.
#   #    NOT standard base64 — the kernel rejects '/' and '+'.
#   export QORCH_KERNEL_SIGNING_KEY_B64=$(python3 -c \
#     "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).rstrip(b'=').decode())")
#   export QORCH_KERNEL_AUDIT_PEPPER_B64=$(python3 -c \
#     "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).rstrip(b'=').decode())")
#   export QORCH_KERNEL_API_KEY_WORKER=$(openssl rand -hex 16)
#   export QORCH_KERNEL_API_KEY_API=$(openssl rand -hex 16)
#
#   # 2. Pull the kernel image from GHCR (no login needed for public pulls).
#   docker pull ghcr.io/arya-labs-pbc/unfireable-safety-kernel:edge
#   # Or, to build from source:
#   docker build -f Dockerfile.prod -t ghcr.io/arya-labs-pbc/unfireable-safety-kernel:dev .
#
#   # 3. Bring up the stack
#   docker compose -f deployment/docker-compose.prod.yml up -d
#
#   # 4. Smoke test (see docs/deployment/smoke-test.md for the full procedure)
#   curl -fsS http://localhost:9000/health

services:
  safety-kernel:
    image: ghcr.io/arya-labs-pbc/unfireable-safety-kernel:edge
    # Pin to a digest in real production:
    #   image: ghcr.io/arya-labs-pbc/unfireable-safety-kernel@sha256:<digest>
    container_name: safety-kernel
    read_only: true
    user: "65532:65532"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    environment:
      QORCH_ENV: "${QORCH_ENV:-dev}"
      QORCH_KERNEL_LISTEN_ADDR: "0.0.0.0:9000"
      QORCH_KERNEL_SIGNING_KEY_B64: "${QORCH_KERNEL_SIGNING_KEY_B64:?must set QORCH_KERNEL_SIGNING_KEY_B64 (base64url-encoded 32 bytes)}"
      QORCH_KERNEL_AUDIT_PEPPER_B64: "${QORCH_KERNEL_AUDIT_PEPPER_B64:?must set QORCH_KERNEL_AUDIT_PEPPER_B64 (base64url-encoded 32 bytes)}"
      QORCH_KERNEL_API_KEY_WORKER: "${QORCH_KERNEL_API_KEY_WORKER:?must set QORCH_KERNEL_API_KEY_WORKER}"
      QORCH_KERNEL_API_KEY_API: "${QORCH_KERNEL_API_KEY_API:?must set QORCH_KERNEL_API_KEY_API}"
      QORCH_KERNEL_TRANSPARENCY_LOG_URL: "http://transparency-log:9100"
    ports:
      - "127.0.0.1:9000:9000"
    # NOTE on healthcheck. The distroless final image carries the
    # kernel binary and shared libraries — nothing else. No shell,
    # no wget/curl/nc, no `--health-probe` subcommand on the binary
    # itself. That's the point of distroless. Docker's in-container
    # healthcheck mechanism therefore cannot be used directly here.
    #
    # Two operator-side patterns are supported instead:
    #
    #   (a) compose / docker run — depend on the orchestrator's TCP
    #       port-listen probe. `ports: - "127.0.0.1:9000:9000"`
    #       above gives the host a port to curl externally; the
    #       compose `depends_on: service_started` (default) handles
    #       startup ordering. We deliberately do NOT set
    #       `service_healthy` because there is no Docker-internal
    #       health signal.
    #
    #   (b) Kubernetes — use a `tcpSocket: { port: 9000 }` readiness
    #       probe in the pod spec. The kernel's HTTP `/health`
    #       endpoint returns 200 once the kernel is up, so an HTTP
    #       readinessProbe also works if you prefer. See
    #       deployment/helm/safety-kernel/ (pending ARY-1886 follow-up).
    #
    # Adding a `qorch-safety-kernel --health-probe` subcommand to the
    # binary is tracked as a separate follow-up; it would add a CLI
    # parser dep and ~30 lines of code. Worth it only if a customer
    # specifically needs container-internal health signaling.
    depends_on:
      - transparency-log
    networks:
      - kernel-net

  transparency-log:
    # Published from the same workflow as the kernel; same multi-arch
    # images, same registry.
    image: ghcr.io/arya-labs-pbc/unfireable-safety-kernel-transparency-log:edge
    container_name: transparency-log
    read_only: true
    user: "65532:65532"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges
    environment:
      TLOG_BIND: "0.0.0.0:9100"
      TLOG_DATA_DIR: "/var/lib/tlog"
    volumes:
      # The log MUST persist across restarts. Snapshot the same way you
      # snapshot any append-only audit store.
      - tlog-data:/var/lib/tlog
    # Same distroless-no-self-probe constraint as the kernel — see the
    # NOTE on healthcheck above. Use orchestrator-external TCP probes.
    networks:
      - kernel-net

  # Drop your application here. It MUST talk to the kernel over
  # safety-kernel:9000 (internal docker DNS) and MUST verify responses
  # against the kernel's signing public key. Failing closed on
  # unreachability is the consumer's responsibility — see
  # docs/integration/circuit-breaker.md.
  #
  # sample-app:
  #   image: my-app:latest
  #   environment:
  #     SAFETY_KERNEL_URL: "http://safety-kernel:9000"
  #     SAFETY_KERNEL_PUBKEY: "${KERNEL_PUBKEY}"
  #   depends_on:
  #     # No Docker-internal healthcheck on the kernel (distroless can
  #     # not self-probe; see NOTE above). The sample app is responsible
  #     # for its own fail-closed retry loop against the kernel —
  #     # see docs/integration/circuit-breaker.md.
  #     - safety-kernel
  #   networks:
  #     - kernel-net

networks:
  kernel-net:
    driver: bridge
    # The kernel and the log talk to each other on this network. The host
    # only exposes the kernel's port (and only on 127.0.0.1, above).

volumes:
  tlog-data:
    # The only piece of mutable state in the stack.
