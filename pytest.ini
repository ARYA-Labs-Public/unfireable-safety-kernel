[pytest]
# The AF adversarial seed fixtures are named `af_<class>_seed.py` to match
# the naming convention scripts/audit_adversarial_coverage.sh enforces.
# pytest's default discovery only matches `test_*.py` / `*_test.py`, so
# without this override `pytest tests/adversarial/python/` collects nothing
# (ARY-2362). The pattern is ADDITIVE — the default test_*.py still works,
# so py-defense and any future test_*.py suites are unaffected.
#
# py-defense runs pytest with `working-directory: py-defense`, so its
# rootdir is py-defense/ and it does not read this repo-root config.
python_files = test_*.py *_test.py af_*_seed.py
